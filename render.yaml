services:
  - type: web
    name: maru-english-corner
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: maru-db
          property: connectionString

databases:
  - name: maru-db
    plan: free
    ipAllowList: []
